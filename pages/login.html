<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Login</title>
    <meta name="description" content="Cine Aurora - Login" />
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="header">
      <div>
        <h1>Cine Aurora</h1>
        <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" />
      </div>
      <div>
        <nav class="nav">
          <a class="nav__link" href="../index.html">Inicio</a>
          <a class="nav__link" href="./estrenos.html">Próximos estrenos</a>
          <a class="nav__link" href="../index.html">Volver</a>
        </nav>

    </header>

    <main>
      <div class="form-container">
        <form class="card-vertical" action="perfil.html">
          <h2>Acceso Clientes</h2>
          <div>
            <label>Email</label>
            <input type="email" required />
          </div>
          <div>
            <label>Contraseña</label>
            <input type="password" required />
          </div>
          <button class="button" type="submit">Ingresar</button>
          <p>¿No eres miembro? <a class="button" href="registro.html">Regístrate</a></p>
        </form>
      </div>
    </main>

    <footer class="footer">

    </footer>

</html>
